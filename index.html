<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>NgobrolinAja</title>

<!-- PWA Meta -->
<meta name="application-name" content="NgobrolinAja">
<meta name="description" content="Aplikasi chat real-time untuk grup dan pribadi">
<meta name="theme-color" content="#f97316">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NgobrolinAja">
<meta name="msapplication-TileColor" content="#080b10">
<meta name="msapplication-tap-highlight" content="no">

<!-- PWA Icons (inline SVG as data URI) -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23f97316'/><text y='.9em' font-size='72' x='14'>💬</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23f97316'/><text y='.9em' font-size='72' x='14'>💬</text></svg>">

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg0:#080b10;--bg1:#0d1117;--bg2:#161b22;--bg3:#1c2128;--bg4:#21262d;--bg5:#2d333b;
  --border:#30363d;--text1:#e6edf3;--text2:#9198a1;--text3:#656d76;
  --accent:#f97316;--accent2:#fb923c;--adim:rgba(249,115,22,.12);--aglow:rgba(249,115,22,.25);
  --green:#3fb950;--red:#f85149;--dm:#58a6ff;--dmdim:rgba(88,166,255,.12);
}
html,body{height:100%;overflow:hidden;}
/* Safe area for notch / Dynamic Island / home indicator */
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
.tnav{padding-top:env(safe-area-inset-top);height:calc(46px + env(safe-area-inset-top));}
.mnav{padding-bottom:env(safe-area-inset-bottom);height:calc(58px + env(safe-area-inset-bottom));}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg0);color:var(--text1);display:flex;align-items:center;justify-content:center;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes ti{from{opacity:0;transform:translateY(10px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg0);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;}
#loading .logo{font-size:28px;font-weight:800;letter-spacing:-.5px;}
#loading .logo span{color:var(--accent);}
#loading .spin{width:30px;height:30px;border:3px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
#loading p{font-size:12px;color:var(--text3);}

/* AUTH */
#auth{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 20%,rgba(249,115,22,.08),transparent 60%),
             radial-gradient(ellipse at 70% 80%,rgba(88,166,255,.06),transparent 60%),var(--bg0);}
.acard{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:36px 32px;width:380px;
  box-shadow:0 24px 60px rgba(0,0,0,.6);animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
.alogo{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.alogo-i{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#f59e0b);
  display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:0 4px 14px var(--aglow);}
.alogo-t{font-size:19px;font-weight:800;letter-spacing:-.5px;}
.alogo-t span{color:var(--accent);}
.atabs{display:flex;gap:4px;background:var(--bg3);border-radius:8px;padding:4px;margin-bottom:22px;}
.atab{flex:1;padding:8px;text-align:center;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;
  transition:all .2s;color:var(--text2);border:none;background:none;font-family:inherit;}
.atab.on{background:var(--bg5);color:var(--text1);}
.fld{margin-bottom:13px;}
.fld label{font-size:11px;color:var(--text2);font-weight:700;display:block;margin-bottom:5px;letter-spacing:.4px;}
.fld input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 13px;
  font-size:13px;color:var(--text1);outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s;}
.fld input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--adim);}
.fld input::placeholder{color:var(--text3);}
.abtn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:9px;
  font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:2px;}
.abtn:hover{background:var(--accent2);transform:translateY(-1px);}
.abtn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.aerr{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);border-radius:8px;
  padding:10px 13px;font-size:12px;color:var(--red);margin-bottom:13px;display:none;}

/* APP */
#app{display:none;width:100%;height:100%;flex-direction:column;}

/* TOP NAV */
.tnav{background:var(--bg2);border-bottom:1px solid var(--border);height:46px;padding:0 14px;
  display:flex;align-items:center;gap:6px;flex-shrink:0;}
.tlogo{font-size:15px;font-weight:800;letter-spacing:-.3px;margin-right:8px;}
.tlogo span{color:var(--accent);}
.tsep{width:1px;height:18px;background:var(--border);margin:0 4px;flex-shrink:0;}
.tbtn{padding:4px 11px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:none;
  white-space:nowrap;font-family:inherit;letter-spacing:.4px;transition:all .15s;}
.tbtn.org{background:var(--accent);color:#fff;}
.tbtn.ghost{background:var(--bg4);color:var(--text2);border:1px solid var(--border);}
.tbtn.ghost:hover{background:var(--bg5);color:var(--text1);}
.tuser{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);flex-shrink:0;}
.tav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--accent),#f59e0b);flex-shrink:0;}
.tsignout{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;background:transparent;
  border:1px solid var(--border);color:var(--text3);cursor:pointer;font-family:inherit;transition:all .15s;}
.tsignout:hover{border-color:var(--red);color:var(--red);}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden;position:relative;}

/* SIDEBAR */
.sidebar{width:275px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .25s cubic-bezier(.4,0,.2,1);}
.sbhead{padding:12px 12px 8px;border-bottom:1px solid var(--border);}
.sbsearch{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:8px 12px;transition:border-color .15s;}
.sbsearch:focus-within{border-color:var(--accent);}
.sbsearch input{background:none;border:none;outline:none;font-size:12px;color:var(--text1);font-family:inherit;width:100%;}
.sbsearch input::placeholder{color:var(--text3);}
.sbtabs{display:flex;padding:6px 8px 0;gap:4px;border-bottom:1px solid var(--border);}
.sbtab{flex:1;padding:8px 4px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:none;
  color:var(--text3);font-family:inherit;border-bottom:2px solid transparent;transition:all .15s;text-align:center;}
.sbtab.on{color:var(--text1);border-bottom-color:var(--accent);}
.sbpanel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.sbsec{padding:8px 8px 4px;}
.newbtn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px;
  border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;margin-bottom:6px;border:none;}
.newbtn.room{background:var(--adim);color:var(--accent);border:1px dashed rgba(249,115,22,.4);}
.newbtn.room:hover{background:rgba(249,115,22,.2);border-color:var(--accent);}
.newbtn.dm{background:var(--dmdim);color:var(--dm);border:1px dashed rgba(88,166,255,.4);}
.newbtn.dm:hover{background:rgba(88,166,255,.2);border-color:var(--dm);}
.listwrap{flex:1;overflow-y:auto;padding:4px 6px 8px;}
.listwrap::-webkit-scrollbar{width:3px;}
.listwrap::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:4px;}

/* LIST ITEMS */
.litem{display:flex;align-items:center;gap:10px;padding:10px;border-radius:9px;cursor:pointer;transition:background .12s;position:relative;}
.litem:hover{background:var(--bg3);}
.litem.on{background:var(--bg4);}
.litem.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;border-radius:0 3px 3px 0;}
.litem.on.tr::before{background:var(--accent);}
.litem.on.td::before{background:var(--dm);}
.lico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;background:var(--bg4);border:1px solid var(--border);}
.lico.dm{border-radius:50%;font-size:14px;font-weight:800;color:#fff;}
.lmeta{flex:1;min-width:0;}
.lname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.lprev{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lright{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.ltime{font-size:10px;color:var(--text3);}

/* CHAT AREA */
.chatarea{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg1);transition:transform .25s cubic-bezier(.4,0,.2,1);}
.nochat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);}
.nochat .ico{font-size:52px;opacity:.3;}
.nochat h3{font-size:16px;font-weight:700;color:var(--text2);}
.nochat p{font-size:13px;}

/* CHAT HEADER */
.chead{background:var(--bg2);border-bottom:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.chback{display:none;width:32px;height:32px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);cursor:pointer;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.chback:hover{background:var(--bg4);color:var(--text1);}
.chico{width:36px;height:36px;border-radius:10px;background:var(--bg4);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.chico.dm{border-radius:50%;font-size:13px;font-weight:800;color:#fff;}
.chinfo .chname{font-size:14px;font-weight:700;}
.chinfo .chsub{font-size:11px;color:var(--text3);}
.chacts{margin-left:auto;display:flex;gap:6px;align-items:center;}
.dmbadge{font-size:10px;font-weight:700;background:var(--dmdim);color:var(--dm);border:1px solid rgba(88,166,255,.3);padding:2px 8px;border-radius:20px;letter-spacing:.5px;}
.chsearch{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;}
.chsearch input{background:none;border:none;outline:none;font-size:12px;color:var(--text1);font-family:inherit;width:150px;}
.chsearch input::placeholder{color:var(--text3);}

/* MESSAGES */
.msgwrap{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:2px;}
.msgwrap::-webkit-scrollbar{width:4px;}
.msgwrap::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:4px;}
.daydiv{display:flex;align-items:center;gap:10px;margin:10px 0 8px;flex-shrink:0;}
.daydiv::before,.daydiv::after{content:'';flex:1;height:1px;background:var(--border);}
.daydiv span{font-size:11px;color:var(--text3);white-space:nowrap;font-weight:500;}
.mrow{display:flex;gap:8px;padding:2px 0;animation:fu .18s ease;}
.mrow.me{flex-direction:row-reverse;}
.mav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;align-self:flex-end;margin-bottom:2px;}
.mcont{max-width:62%;display:flex;flex-direction:column;gap:2px;}
.mrow.me .mcont{align-items:flex-end;}
.msender{font-size:11px;font-weight:600;margin-bottom:2px;color:var(--text2);}
.bub{padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.55;word-break:break-word;}
.bub.o{background:var(--bg3);border:1px solid var(--border);color:var(--text1);border-bottom-left-radius:4px;}
.bub.s{background:linear-gradient(135deg,#1a3d2b,#1e4533);border:1px solid #2d5a3d;color:#d1fae5;border-bottom-right-radius:4px;}
.bub.dmo{background:#0f1e2e;border:1px solid #1a3a5c;color:#bfdbfe;border-bottom-left-radius:4px;}
.bub.dms{background:linear-gradient(135deg,#0f1e2e,#0a1628);border:1px solid #1e4080;color:#bfdbfe;border-bottom-right-radius:4px;}
.mmeta{display:flex;align-items:center;gap:5px;margin-top:1px;}
.mtime{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.mtick{font-size:11px;color:var(--accent);}
.mtick.dm{color:var(--dm);}

/* INPUT */
.inparea{background:var(--bg2);border-top:1px solid var(--border);padding:10px 14px;display:flex;align-items:flex-end;gap:8px;flex-shrink:0;}
.inpbox{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:9px 13px;display:flex;align-items:center;transition:border-color .15s,box-shadow .15s;}
.inpbox:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--adim);}
.inpbox.dm:focus-within{border-color:var(--dm);box-shadow:0 0 0 3px var(--dmdim);}
.inpbox textarea{flex:1;background:none;border:none;outline:none;font-size:13px;color:var(--text1);resize:none;font-family:inherit;max-height:120px;line-height:1.5;overflow-y:auto;}
.inpbox textarea::placeholder{color:var(--text3);}
.sndbtn{width:38px;height:38px;border-radius:10px;color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.sndbtn.r{background:var(--accent);}
.sndbtn.r:hover{background:var(--accent2);}
.sndbtn.d{background:var(--dm);}
.sndbtn.d:hover{background:#79b8ff;}
.sndbtn:disabled{opacity:.4;cursor:not-allowed;}

/* MOBILE BOTTOM NAV */
.mnav{display:none;position:fixed;bottom:0;left:0;right:0;height:58px;background:var(--bg2);border-top:1px solid var(--border);z-index:50;}
.mnavinner{display:flex;align-items:center;height:58px;}
.mnbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--text3);font-family:inherit;font-size:10px;font-weight:600;transition:color .15s;padding:8px 0;}
.mnbtn.on{color:var(--accent);}
.mnbtn.don{color:var(--dm);}
.mnbtn svg{width:21px;height:21px;}

/* MODALS */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px);animation:fi .15s;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:26px 26px 22px;width:380px;box-shadow:0 24px 60px rgba(0,0,0,.6);animation:su .2s cubic-bezier(.34,1.56,.64,1);}
.modal h3{font-size:16px;font-weight:800;margin-bottom:16px;}
.macts{display:flex;gap:8px;margin-top:18px;}
.mcancel{flex:1;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
.mcancel:hover{background:var(--bg4);color:var(--text1);}
.mok{flex:2;padding:10px;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.mok.r{background:var(--accent);}
.mok.r:hover{background:var(--accent2);}
.mok.d{background:var(--dm);}
.mok.d:hover{background:#79b8ff;color:#0d1117;}
.merr{font-size:11px;color:var(--red);margin-top:5px;display:none;}
.erow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.epick{width:36px;height:36px;border-radius:8px;font-size:17px;background:var(--bg3);border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.epick:hover,.epick.on{border-color:var(--accent);background:var(--adim);}
.uslist{max-height:190px;overflow-y:auto;margin-top:8px;border-radius:8px;border:1px solid var(--border);}
.uslist::-webkit-scrollbar{width:3px;}
.uslist::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:4px;}
.usitem{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border);}
.usitem:last-child{border-bottom:none;}
.usitem:hover{background:var(--bg3);}
.usitem.on{background:var(--dmdim);}
.usav{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;}
.usname{font-size:13px;font-weight:600;}
.usemail{font-size:11px;color:var(--text3);}
.uscheck{margin-left:auto;color:var(--dm);font-size:15px;}

/* TOAST */
.toast{position:fixed;bottom:70px;right:16px;background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:11px 16px;font-size:13px;font-weight:500;color:var(--text1);box-shadow:0 8px 28px rgba(0,0,0,.5);z-index:999;animation:ti .25s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:8px;}

.hidden{display:none!important;}
.av1{background:linear-gradient(135deg,#f97316,#f59e0b)}.av2{background:linear-gradient(135deg,#3b82f6,#06b6d4)}
.av3{background:linear-gradient(135deg,#10b981,#059669)}.av4{background:linear-gradient(135deg,#8b5cf6,#6d28d9)}
.av5{background:linear-gradient(135deg,#ec4899,#db2777)}.av6{background:linear-gradient(135deg,#ef4444,#dc2626)}
.av7{background:linear-gradient(135deg,#14b8a6,#0d9488)}.av8{background:linear-gradient(135deg,#eab308,#ca8a04)}

/* RESPONSIVE */
@media(max-width:768px){
  .acard{width:calc(100% - 28px);padding:26px 18px;border-radius:14px;}
  .tbtn,.tsep{display:none;}
  .tnav{height:48px;padding:0 12px;}
  .tlogo{margin-right:0;font-size:15px;}
  #navName{display:none;}
  .tsignout{padding:4px 8px;font-size:11px;}
  .sidebar{position:absolute;top:0;left:0;right:0;bottom:0;width:100%;z-index:10;}
  .sidebar.out{transform:translateX(-100%);pointer-events:none;}
  .chatarea{position:absolute;top:0;left:0;right:0;bottom:0;width:100%;transform:translateX(100%);}
  .chatarea.in{transform:translateX(0);}
  .chback{display:flex;}
  .chsearch{display:none;}
  .mnav{display:block;}
  .listwrap{padding-bottom:68px;}
  .msgwrap{padding:10px 10px 8px;}
  .inparea{padding:8px 10px 68px;}
  .mcont{max-width:80%;}
  .modal{width:calc(100% - 20px);padding:20px 16px 16px;}
  .uslist{max-height:150px;}
  .nochat{padding-bottom:60px;}
}
@media(max-width:400px){
  .acard{padding:22px 14px;}
  .bub{font-size:14px;}
  .mcont{max-width:86%;}
}
</style>
</head>
<body>

<div id="loading">
  <div class="logo">Ngobrolin<span>Aja</span></div>
  <div class="spin"></div>
  <p>Menghubungkan ke server...</p>
</div>

<div id="auth" class="hidden">
  <div class="acard">
    <div class="alogo">
      <div class="alogo-i">&#x1F4AC;</div>
      <div class="alogo-t">Ngobrolin<span>Aja</span></div>
    </div>
    <div id="aerr" class="aerr"></div>
    <div class="atabs">
      <button class="atab on" id="tLogin" onclick="switchTab('login')">Masuk</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, setDoc, getDoc, getDocs, onSnapshot, query, orderBy, serverTimestamp, updateDoc, where } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

const app  = initializeApp({apiKey:"AIzaSyDZAPWXDIPDr6_ye1hr4Qkfw6wMoJccZAg",authDomain:"ngobrolin-aja-77.firebaseapp.com",projectId:"ngobrolin-aja-77",storageBucket:"ngobrolin-aja-77.firebasestorage.app",messagingSenderId:"56435429415",appId:"1:56435429415:web:64b3f0274b13966e693e02"});
const auth = getAuth(app);
const db   = getFirestore(app);

let me=null, curChat=null, unsubR=null, unsubD=null, unsubM=null;
let dmCache={}, selEmoji='&#x1F4AC;', selDmUser=null;
const EMOJIS=['&#x1F4AC;','&#x1F35C;','&#x1F355;','&#x1F3AE;','&#x1F4CA;','&#x1F4B0;','&#x1F3E6;','&#x1F4CB;','&#x1F3AF;','&#x1F525;','&#x26A1;','&#x1F680;','&#x1F389;','&#x1F4A1;','&#x1F6E0;','&#x1F4E2;'];

const $=id=>document.getElementById(id);
function avC(uid){return 'av'+(uid.charCodeAt(0)%8+1);}
function ini(n){return n?n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2):'?';}
function tStr(ts){if(!ts)return '';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});}
function dLbl(ts){if(!ts)return '';const d=ts.toDate?ts.toDate():new Date(ts);const df=Math.floor((new Date()-d)/86400000);if(df===0)return 'Hari ini';if(df===1)return 'Kemarin';return d.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});}
function toast(msg,ico='&#x2705;'){const t=document.createElement('div');t.className='toast';t.innerHTML='<span>'+ico+'</span><span>'+msg+'</span>';document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
function dmId(a,b){return [a,b].sort().join('_');}
function isMobile(){return window.innerWidth<=768;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function authErrMsg(code){const m={'auth/invalid-credential':'Email atau password salah.','auth/wrong-password':'Password salah.','auth/user-not-found':'Akun tidak ditemukan. Silakan daftar.','auth/invalid-email':'Format email tidak valid.','auth/email-already-in-use':'Email sudah terdaftar.','auth/weak-password':'Password minimal 6 karakter.','auth/too-many-requests':'Terlalu banyak percobaan, coba lagi nanti.','auth/network-request-failed':'Koneksi gagal, periksa internet kamu.','auth/operation-not-allowed':'Login email belum diaktifkan di Firebase.'};return m[code]||('Error: '+code);}
function showErr(msg){const e=$('aerr');e.textContent=msg;e.style.display='block';}
function hideErr(){$('aerr').style.display='none';}

window.switchTab=tab=>{hideErr();$('tLogin').classList.toggle('on',tab==='login');$('tReg').classList.toggle('on',tab==='reg');$('fLogin').classList.toggle('hidden',tab!=='login');$('fReg').classList.toggle('hidden',tab!=='reg');};

window.doLogin=async()=>{
  const email=$('lEmail').value.trim(), pw=$('lPass').value;
  if(!email)return showErr('Email wajib diisi.');
  if(!pw)return showErr('Password wajib diisi.');
  const btn=$('btnLogin');
  btn.disabled=true;btn.textContent='Memproses...';
  try{await signInWithEmailAndPassword(auth,email,pw);}
  catch(err){console.error('LOGIN ERR:',err.code,err.message);showErr(authErrMsg(err.code));btn.disabled=false;btn.textContent='Masuk';}
};

window.doRegister=async()=>{
  const name=$('rName').value.trim(),email=$('rEmail').value.trim(),pw=$('rPass').value;
  if(!name)return showErr('Nama wajib diisi.');
  if(!email)return showErr('Email wajib diisi.');
  if(!pw||pw.length<6)return showErr('Password minimal 6 karakter.');
  const btn=$('btnReg');
  btn.disabled=true;btn.textContent='Membuat akun...';
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pw);
    await updateProfile(cred.user,{displayName:name});
    await setDoc(doc(db,'users',cred.user.uid),{displayName:name,email,uid:cred.user.uid,createdAt:serverTimestamp()});
  }catch(err){console.error('REG ERR:',err.code,err.message);showErr(authErrMsg(err.code));btn.disabled=false;btn.textContent='Buat Akun';}
};

window.doSignOut=async()=>{if(unsubR)unsubR();if(unsubD)unsubD();if(unsubM)unsubM();dmCache={};curChat=null;await signOut(auth);};

onAuthStateChanged(auth,user=>{
  $('loading').style.display='none';
  if(user){
    me=user;
    $('auth').classList.add('hidden');
    $('app').style.display='flex';
    $('navAv').textContent=ini(user.displayName||user.email);
    $('navName').textContent=user.displayName||user.email;
    initEmoji();listenRooms();listenDms();
  }else{
    me=null;
    $('auth').classList.remove('hidden');
    $('app').style.display='none';
  }
});

window.sbTab=tab=>{$('tbRooms').classList.toggle('on',tab==='rooms');$('tbDms').classList.toggle('on',tab==='dms');$('pRooms').classList.toggle('hidden',tab!=='rooms');$('pDms').classList.toggle('hidden',tab!=='dms');};

function listenRooms(){const q=query(collection(db,'rooms'),orderBy('lastActivity','desc'));unsubR=onSnapshot(q,snap=>{const r=[];snap.forEach(d=>r.push({id:d.id,...d.data()}));renderRooms(r);});}
function renderRooms(rooms){const el=$('roomList');if(!rooms.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px;">Belum ada grup.</div>';return;}el.innerHTML='';rooms.forEach(r=>{const d=document.createElement('div');d.className='litem tr'+(curChat?.id===r.id?' on':'');d.dataset.id=r.id;d.innerHTML='<div class="lico">'+( r.icon||'&#x1F4AC;')+'</div><div class="lmeta"><div class="lname">'+r.name+'</div><div class="lprev">'+(r.lastMsg||'Belum ada pesan')+'</div></div><div class="lright">'+(r.lastActivity?'<div class="ltime">'+tStr(r.lastActivity)+'</div>':'')+'</div>';d.onclick=()=>openChat({id:r.id,type:'room',...r});el.appendChild(d);});}

function listenDms(){const q=query(collection(db,'dms'),where('members','array-contains',me.uid));unsubD=onSnapshot(q,snap=>{snap.docChanges().forEach(c=>{if(c.type==='removed')delete dmCache[c.doc.id];else dmCache[c.doc.id]={id:c.doc.id,...c.doc.data()};});const s=Object.values(dmCache).sort((a,b)=>(b.lastActivity?.toMillis?.()??0)-(a.lastActivity?.toMillis?.()??0));renderDms(s);});}
function renderDms(dms){const el=$('dmList');if(!dms.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px;line-height:1.8;">Belum ada chat pribadi.<br>Klik <b style="color:var(--dm)">+ Mulai Chat Pribadi</b>.</div>';return;}el.innerHTML='';dms.forEach(dm=>{if(!dm.members)return;const oid=dm.members.find(m=>m!==me.uid)||dm.members[0];const on=dm.memberNames?.[oid]||'User';const av=avC(oid||'x');const d=document.createElement('div');d.className='litem td'+(curChat?.id===dm.id?' on':'');d.dataset.id=dm.id;const ts=dm.lastActivity?tStr(dm.lastActivity):'';d.innerHTML='<div class="lico dm '+av+'">'+ini(on)+'</div><div class="lmeta"><div class="lname">'+on+'</div><div class="lprev">'+(dm.lastMsg||'Belum ada pesan')+'</div></div><div class="lright">'+(ts?'<div class="ltime">'+ts+'</div>':'')+'</div>';d.onclick=()=>openChat({id:dm.id,type:'dm',otherName:on,otherId:oid,...dm});el.appendChild(d);});}

window.filterList=()=>{const q=$('sbSearch').value.toLowerCase();document.querySelectorAll('.litem').forEach(el=>{el.style.display=el.querySelector('.lname').textContent.toLowerCase().includes(q)?'':'none';});};

function openChat(chat){
  curChat=chat;const isDm=chat.type==='dm';
  $('noChat').style.display='none';
  const cv=$('chatView');cv.style.display='flex';
  const ico=$('chIco');
  if(isDm){ico.className='chico dm '+avC(chat.otherId||'x');ico.textContent=ini(chat.otherName||'U');$('chName').textContent=chat.otherName||'User';$('chSub').textContent='Chat pribadi';$('chDmBadge').classList.remove('hidden');}
  else{ico.className='chico';ico.textContent=chat.icon||'&#x1F4AC;';$('chName').textContent=chat.name;$('chSub').textContent=chat.description||'Grup chat';$('chDmBadge').classList.add('hidden');}
  $('inpBox').className='inpbox'+(isDm?' dm':'');
  $('sndBtn').className='sndbtn '+(isDm?'d':'r');
  $('msgInp').placeholder=isDm?'Pesan pribadi...':'Ketik pesan...';
  document.querySelectorAll('.litem').forEach(el=>el.classList.toggle('on',el.dataset.id===chat.id));
  $('msgBox').innerHTML='';
  if(unsubM)unsubM();
  listenMsgs(isDm?'dms/'+chat.id+'/messages':'rooms/'+chat.id+'/messages',isDm);
  $('msgInp').focus();
  if(isMobile()){$('sidebar').classList.add('out');$('chatarea').classList.add('in');$('mnRooms').classList.toggle('on',!isDm);$('mnDms').classList.toggle('don',isDm);if(isDm)$('mnDms').classList.remove('on');$('mnProf').classList.remove('on','don');}
}

function listenMsgs(path,isDm){const q=query(collection(db,path),orderBy('createdAt','asc'));unsubM=onSnapshot(q,snap=>{const box=$('msgBox');box.innerHTML='';let ld='';snap.forEach(d=>{const msg={id:d.id,...d.data()};const dl=dLbl(msg.createdAt);if(dl!==ld){const dv=document.createElement('div');dv.className='daydiv';dv.innerHTML='<span>'+dl+'</span>';box.appendChild(dv);ld=dl;}box.appendChild(makeBub(msg,isDm));});scrollBot();});}
function makeBub(msg,isDm){const self=msg.uid===me.uid;const row=document.createElement('div');row.className='mrow'+(self?' me':'');const bc=isDm?(self?'dms':'dmo'):(self?'s':'o');row.innerHTML='<div class="mav '+avC(msg.uid||'x')+'">'+ini(msg.displayName||'U')+'</div><div class="mcont">'+(self?'':'<div class="msender">'+( msg.displayName||'User')+'</div>')+'<div class="bub '+bc+'">'+esc(msg.text)+'</div><div class="mmeta"><span class="mtime">'+tStr(msg.createdAt)+'</span>'+(self?'<span class="mtick'+(isDm?' dm':'')+'">&#x2713;&#x2713;</span>':'')+'</div></div>';return row;}
function scrollBot(){const w=$('msgWrap');setTimeout(()=>{w.scrollTop=w.scrollHeight;},50);}

window.sendMsg=async()=>{if(!curChat||!me)return;const inp=$('msgInp'),text=inp.value.trim();if(!text)return;inp.value='';autoResize(inp);$('sndBtn').disabled=true;const isDm=curChat.type==='dm';try{await addDoc(collection(db,isDm?'dms/'+curChat.id+'/messages':'rooms/'+curChat.id+'/messages'),{text,uid:me.uid,displayName:me.displayName||me.email,createdAt:serverTimestamp()});await updateDoc(doc(db,isDm?'dms/'+curChat.id:'rooms/'+curChat.id),{lastMsg:text.length>50?text.slice(0,50)+'...':text,lastActivity:serverTimestamp()});}catch(e){toast('Gagal kirim: '+e.message,'&#x274C;');}$('sndBtn').disabled=false;inp.focus();};
window.handleKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}};
window.autoResize=el=>{el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';};

window.openRoomModal=()=>{$('rRoomName').value='';$('rRoomDesc').value='';$('errRoom').style.display='none';$('mRoom').classList.remove('hidden');};
window.createRoom=async()=>{const name=$('rRoomName').value.trim(),desc=$('rRoomDesc').value.trim(),err=$('errRoom');if(!name){err.textContent='Nama wajib diisi';err.style.display='block';return;}try{const ref=await addDoc(collection(db,'rooms'),{name,description:desc,icon:selEmoji,createdBy:me.uid,createdAt:serverTimestamp(),lastActivity:serverTimestamp(),lastMsg:''});closeModal('mRoom');toast('Grup "'+name+'" dibuat!');openChat({id:ref.id,type:'room',name,description:desc,icon:selEmoji});sbTab('rooms');}catch(e){err.textContent=e.message;err.style.display='block';}};

window.openDmModal=()=>{selDmUser=null;$('dmSearch').value='';$('errDm').style.display='none';$('userList').innerHTML='<div style="padding:14px;text-align:center;color:var(--text3);font-size:12px;">Ketik untuk mencari...</div>';$('mDm').classList.remove('hidden');};
let dmDeb=null;
window.searchUsers=()=>{clearTimeout(dmDeb);const q=$('dmSearch').value.trim().toLowerCase();const ul=$('userList');if(q.length<2){ul.innerHTML='<div style="padding:14px;text-align:center;color:var(--text3);font-size:12px;">Ketik minimal 2 karakter...</div>';return;}dmDeb=setTimeout(async()=>{ul.innerHTML='<div style="padding:14px;text-align:center;color:var(--text3);font-size:12px;">Mencari...</div>';try{const snap=await getDocs(collection(db,'users'));const users=[];snap.forEach(d=>{const u=d.data();if(u.uid!==me.uid&&(u.displayName?.toLowerCase().includes(q)||u.email?.toLowerCase().includes(q)))users.push(u);});if(!users.length){ul.innerHTML='<div style="padding:14px;text-align:center;color:var(--text3);font-size:12px;">Tidak ditemukan</div>';return;}ul.innerHTML='';users.forEach(u=>{const isSel=selDmUser?.uid===u.uid;const d=document.createElement('div');d.className='usitem'+(isSel?' on':'');d.innerHTML='<div class="usav '+avC(u.uid)+'">'+ini(u.displayName)+'</div><div><div class="usname">'+u.displayName+'</div><div class="usemail">'+u.email+'</div></div>'+(isSel?'<span class="uscheck">&#x2713;</span>':'');d.onclick=()=>{selDmUser=u;searchUsers();};ul.appendChild(d);});}catch(e){ul.innerHTML='<div style="padding:14px;color:var(--red);font-size:12px;">'+e.message+'</div>';}},400);};
window.startDm=async()=>{const err=$('errDm');if(!selDmUser){err.textContent='Pilih pengguna dulu';err.style.display='block';return;}const id=dmId(me.uid,selDmUser.uid);try{const ref=doc(db,'dms',id);const ex=await getDoc(ref);if(!ex.exists()){await setDoc(ref,{members:[me.uid,selDmUser.uid],memberNames:{[me.uid]:me.displayName||me.email,[selDmUser.uid]:selDmUser.displayName||selDmUser.email},createdAt:serverTimestamp(),lastActivity:serverTimestamp(),lastMsg:''});}closeModal('mDm');toast('Chat dengan '+selDmUser.displayName+' dibuka!');sbTab('dms');openChat({id,type:'dm',otherName:selDmUser.displayName||selDmUser.email,otherId:selDmUser.uid});}catch(e){err.textContent=e.message;err.style.display='block';}};

window.closeModal=id=>$(id).classList.add('hidden');

function initEmoji(){const c=$('ePicker');c.innerHTML='';EMOJIS.forEach(e=>{const b=document.createElement('button');b.className='epick'+(e===selEmoji?' on':'');b.textContent=e;b.onclick=()=>{selEmoji=e;document.querySelectorAll('.epick').forEach(x=>x.classList.remove('on'));b.classList.add('on');};c.appendChild(b);});}

window.mNav=tab=>{['mnRooms','mnDms','mnProf'].forEach(id=>$( id).classList.remove('on','don'));if(tab==='rooms'){$('mnRooms').classList.add('on');sbTab('rooms');showSb();}else if(tab==='dms'){$('mnDms').classList.add('don');sbTab('dms');showSb();}else{$('mnProf').classList.add('on');showSb();toast((me?.displayName||me?.email||'User')+' - Klik Keluar untuk logout','&#x1F464;');}};
function showSb(){$('sidebar').classList.remove('out');$('chatarea').classList.remove('in');}
window.goBack=()=>showSb();
</script>
<script>
// Register Service Worker for PWA
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(r => console.log('SW registered:', r.scope))
      .catch(e => console.log('SW failed:', e));
  });
}

// PWA Install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show install button if available
  const btn = document.getElementById('installBtn');
  if(btn) btn.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  const btn = document.getElementById('installBtn');
  if(btn) btn.style.display = 'none';
});
window.installApp = async () => {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
};
</script>
</body>
